<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE-edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagination html css javascript</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

</head>

<body>
    <div class="container">
        <button class="button" id="startBtn" disabled>
            <i class="fa-solid fa-angles-left"></i>
        </button>
        <button class="button prevNext" id="prev" disabled>
            <i class="fa-solid fa-angle-left"></i>
        </button>

        <div class="links">
            <a href="#" class="link active">1</a>
            <a href="#" class="link">2</a>
            <a href="#" class="link">3</a>
            <a href="#" class="link">4</a>
            <a href="#" class="link">5</a>
            <a href="#" class="link">6</a>
            <a href="#" class="link">7</a>
            <a href="#" class="link">8</a>
            <a href="#" class="link">9</a>
            <a href="#" class="link">10</a>
            <a href="#" class="link">11</a>
            <a href="#" class="link">12</a>
            <a href="#" class="link">13</a>
            <a href="#" class="link">14</a>
            <a href="#" class="link">15</a>
            <a href="#" class="link">16</a>

        </div>

        <button class="button prevNext" id="next">
            <i class="fa-solid fa-angle-right"></i>
        </button>
        <button class="button" id="endBtn">
            <i class="fa-solid fa-angles-right"></i>
        </button>
        <div class="page-info" id="pageInfo"></div>

    </div>
</body>

</html>
